# Tailscale IP forwarding (persistent) — pairs with §7.3 of the guide.
#
# Drop in as /etc/sysctl.d/99-tailscale.conf, then apply:
#   sudo cp bonus/99-tailscale.conf /etc/sysctl.d/99-tailscale.conf
#   sudo sysctl -p /etc/sysctl.d/99-tailscale.conf
#
# Required for Tailscale subnet routing (advertising 192.168.1.0/24 etc.).
# Both lines set — IPv4 is what most home LANs actually use, IPv6 is for
# tailnet IPv6 traffic.

net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1
